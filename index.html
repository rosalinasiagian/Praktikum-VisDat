<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Chart Pertamaku</title>
  <style>
    body { font-family: sans-serif; background: #F0F9FF; padding: 20px; }
    h1   { color: #1E3A5F; text-align: center; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    .card { background: white; border-radius: 12px; padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <h1>Dashboard Penjualan Toko Ku</h1>
  <div class="grid">
    <div class="card">
      <h3>Penjualan Bulanan (Bar)</h3>
      <canvas id="barChart"></canvas>
    </div>
    <div class="card">
      <h3>Tren Pengunjung (Line)</h3>
      <canvas id="lineChart"></canvas>
    </div>
    <div class="card">
      <h3>Kategori Produk (Pie)</h3>
      <canvas id="pieChart"></canvas>
    </div>
  </div>

  <script>
    // Data
    const bulan = ['Jan','Feb','Mar','Apr','Mei','Jun'];
    const penjualan = [120, 190, 150, 210, 180, 240];
    const pengunjung = [800, 1200, 950, 1450, 1100, 1600];

    // 1. BAR CHART
    new Chart(document.getElementById('barChart'), {
      type: 'bar',
      data: { labels: bulan,
              datasets: [{ label: 'Penjualan (juta)',
                           data: penjualan,
                           backgroundColor: '#0EA5E9' }] },
      options: { responsive: true }
    });

    // 2. LINE CHART
    new Chart(document.getElementById('lineChart'), {
      type: 'line',
      data: { labels: bulan,
              datasets: [{ label: 'Pengunjung',
                           data: pengunjung,
                           borderColor: '#22C55E',
                           tension: 0.4, fill: true }] },
      options: { responsive: true }
    });

    // 3. PIE CHART
    new Chart(document.getElementById('pieChart'), {
      type: 'pie',
      data: { labels: ['Elektronik','Fashion','Makanan','Lainnya'],
              datasets: [{ data: [35, 28, 22, 15],
                           backgroundColor: 
                           ['#0EA5E9','#F59E0B','#22C55E','#8B5CF6'] }] },
      options: { responsive: true }
    });
  </script>
</body>
</html>
